<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1C vs Programming Languages</title>
    <style>
        :root {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #f5f8ff;
        }
        html,
        body,
        #app {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top, #18253e 0%, #070b15 68%);
        }
        #app {
            position: relative;
        }
        .hud {
            position: absolute;
            z-index: 10;
            background: rgba(7, 11, 21, 0.7);
            border: 1px solid rgba(200, 214, 255, 0.24);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        #leaderboard {
            top: 16px;
            right: 16px;
            min-width: 200px;
            padding: 12px;
        }
        #leaderboard h3 {
            margin: 0 0 8px;
            font-size: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #a9c3ff;
        }
        #leaderboard ol {
            margin: 0;
            padding-left: 18px;
            line-height: 1.45;
            font-size: 13px;
        }
        #status {
            top: 16px;
            left: 16px;
            padding: 10px 12px;
            font-size: 13px;
        }
        #minimap {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 10;
            width: 180px;
            height: 180px;
            border-radius: 12px;
            border: 1px solid rgba(200, 214, 255, 0.24);
            background: rgba(4, 7, 13, 0.72);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        #gameOver {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(3, 5, 11, 0.8);
        }
        #gameOver .panel {
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(200, 214, 255, 0.28);
            background: rgba(6, 10, 20, 0.92);
            min-width: 320px;
            text-align: center;
        }
        #gameOver h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        #restartBtn {
            border: none;
            margin-top: 14px;
            background: linear-gradient(120deg, #4a84ff, #6ea0ff);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        #restartBtn:hover {
            filter: brightness(1.08);
        }
    </style>
</head>
<body>
<div id="app">
    <div id="status" class="hud">Mass: <span id="massValue">0</span></div>
    <div id="leaderboard" class="hud">
        <h3>Leaderboard</h3>
        <ol id="leaderboardList"></ol>
    </div>
    <canvas id="minimap" width="180" height="180"></canvas>
    <div id="gameOver">
        <div class="panel">
            <h2>1C was consumed</h2>
            <p id="gameOverText"></p>
            <button id="restartBtn">Restart</button>
        </div>
    </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
